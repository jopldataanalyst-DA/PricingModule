<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Pricing — Rajnandini ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#0d0f0e;--surface:#111614;--surface2:#181e1b;--surface3:#1e2724; --gold:#c9a96e;--gold2:#e8c98a;--gold-dim:rgba(201,169,110,0.15); --green:#2d6a4f;--green-light:#40916c;--green-dim:rgba(64,145,108,0.15); --text:#e8e4dc;--text-muted:#7a8580;--text-dim:#4a5550; --border:#222c28;--border2:#2a3530; --danger:#e05252;--danger-dim:rgba(224,82,82,0.12); --warning:#f4a261;--warning-dim:rgba(244,162,97,0.12); --info:#4db8d4;--info-dim:rgba(77,184,212,0.12); --success:#52b788;--success-dim:rgba(82,183,136,0.12); --sidebar-w:220px;--header-h:60px;--radius:10px; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold2);line-height:1.2}
.logo-sub{font-size:9px;color:var(--text-muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.sidebar-user{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gold));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.nav-section{padding:12px 0;flex:1;overflow-y:auto}
.nav-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all 0.15s;text-decoration:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}.nav-item.active{background:var(--gold-dim);color:var(--gold2)}.nav-item .icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;flex-shrink:0}
.header-title{font-size:15px;font-weight:600}.header-badge{background:var(--gold-dim);color:var(--gold);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.sync-time{font-size:11px;color:var(--text-muted)}
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0;flex-shrink:0}
.stat-card{flex:1;padding:14px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.stat-card:last-child{border-right:none}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.stat-value{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.stat-value.gold{color:var(--gold2)}.stat-value.green{color:var(--success)}.stat-value.blue{color:var(--info)}.stat-value.orange{color:var(--warning)}.stat-value.purple{color:#b48ef5}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;flex:1;min-width:200px;max-width:360px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:100%}
.search-box input::placeholder{color:var(--text-muted)}
.filter-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;min-width:120px}
.column-picker{position:relative}
.column-menu{position:absolute;right:0;top:calc(100% + 6px);width:260px;max-height:360px;overflow:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;box-shadow:0 16px 36px rgba(0,0,0,0.45);padding:8px;display:none;z-index:40}
.column-menu.open{display:block}
.column-option{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:12px;color:var(--text);cursor:pointer}
.column-option:hover{background:var(--surface3)}
.column-option input{accent-color:var(--gold)}
.column-menu-actions{display:flex;gap:6px;padding:6px 4px 8px;border-bottom:1px solid var(--border2);margin-bottom:4px}
.clear-filter-btn{display:none}
.clear-filter-btn.show{display:flex}
.th-inner{display:flex;align-items:center;gap:6px}
.th-label{cursor:pointer}
.filter-btn{width:22px;height:22px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.filter-menu{position:fixed;width:280px;max-height:380px;overflow:hidden;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;box-shadow:0 16px 36px rgba(0,0,0,0.45);padding:8px;display:none;z-index:2000}
.filter-menu.open{display:block}
.filter-menu-search{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:7px 9px;font-size:12px;outline:none;margin-bottom:8px}
.filter-menu-list{max-height:230px;overflow:auto;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:4px 0;margin:6px 0}
.filter-menu-actions{display:flex;gap:6px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8914e);color:#1a1208}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,169,110,0.3)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text-muted)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(224,82,82,0.2)}
.btn-sm{padding:5px 10px;font-size:11px}
.table-wrap{flex:1;overflow:auto;position:relative}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:10}
th{background:var(--surface2);color:var(--text-muted);font-weight:600;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;font-size:10px;letter-spacing:0.5px;text-transform:uppercase}
th:hover{color:var(--gold)}.th.sorted{color:var(--gold)}
td{padding:9px 12px;border-bottom:1px solid rgba(34,44,40,0.6);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace;font-size:11px}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge-avail{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif}
.badge-yes{background:var(--success-dim);color:var(--success)}.badge-no{background:var(--danger-dim);color:var(--danger)}
.pagination{background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.page-info{font-size:12px;color:var(--text-muted);margin-right:auto}
.page-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.page-btn:hover{border-color:var(--gold);color:var(--gold)}.page-btn.active{background:var(--gold);color:#1a1208;border-color:var(--gold);font-weight:700}.page-btn:disabled{opacity:0.3;cursor:not-allowed}
.page-size-select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;outline:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:min(600px,95vw);max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Playfair Display',serif;font-size:18px}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:4px}
.modal-body{padding:24px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.form-field input,.form-field select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s}
.form-field input:focus,.form-field select:focus{border-color:var(--gold)}
.form-field input:disabled{opacity:0.4;cursor:not-allowed}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.import-drop{border:2px dashed var(--border2);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s}
.import-drop:hover,.import-drop.drag{border-color:var(--gold);background:var(--gold-dim)}
.import-drop .icon{font-size:40px;margin-bottom:12px}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;min-width:240px;display:flex;align-items:center;gap:10px;animation:toastIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-color:rgba(82,183,136,0.4)}.toast.error{border-color:rgba(224,82,82,0.4)}.toast.info{border-color:rgba(77,184,212,0.4)}
.table-loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-muted);gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.actions-cell{display:flex;gap:4px}
.col-blurred{filter:blur(4px);pointer-events:none}

/* ── Override panel ─────────────────────────────────────────────────── */
.override-panel{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;transition:border-color .15s}
.override-panel:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.1)}
.op-label{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.op-input{background:none;border:none;outline:none;color:var(--gold2);font-size:13px;font-family:'DM Mono',monospace;font-weight:600;width:64px;text-align:right}
.op-suffix{font-size:11px;color:var(--text-muted);margin-left:1px;flex-shrink:0}
.op-clear{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 1px;line-height:1;transition:color .15s;display:none;margin-left:2px;flex-shrink:0}
.op-clear.show{display:block}
.op-clear:hover{color:var(--danger)}
.btn-apply{background:linear-gradient(135deg,var(--gold),#b8914e);color:#1a1208;border:none;padding:6px 14px;font-size:11px;font-weight:700;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-apply:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,169,110,.3)}
.btn-apply.has-override{background:var(--gold);box-shadow:0 0 0 2px rgba(201,169,110,.35)}
.btn-reset-ov{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(224,82,82,.25);padding:6px 12px;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;display:none;align-items:center;gap:4px}
.btn-reset-ov.show{display:flex}
.btn-reset-ov:hover{background:rgba(224,82,82,.2)}
.override-badge{background:var(--gold-dim);border:1px solid rgba(201,169,110,.3);color:var(--gold2);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;display:none;font-family:'DM Sans',sans-serif}
.override-badge.show{display:inline-flex;align-items:center;gap:4px}

/* ── Recalculated cell highlight ────────────────────────────────────── */
@keyframes cellFlash{0%{background:rgba(201,169,110,.22)}100%{background:transparent}}
td.recalc{animation:cellFlash .5s ease forwards;color:var(--gold2) !important}
td.recalc-neg{animation:cellFlash .5s ease forwards;color:var(--danger) !important}
td.recalc,td.recalc-neg{font-weight:600}
</style>
</head>

<script>
var API = '';
var token = localStorage.getItem('token');
var user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = '/';

var COLUMN_STORAGE_KEY = 'amazonPricingColumns:v2';
var state = {
  page:1, pageSize:50, total:0, totalPages:0,
  sortBy:'id', sortDir:'asc',
  columns:{ visible:[], all:[], editable:[], labels:{} },
  editItem:null, searchTimer:null, requestSeq:0,
  activeFilters:{}, currentItems:[],
  filterMenuColumn:null, filterMenuValues:[],
  // overriddenSkus: Map of item.id → { original: {...item}, computed: {...newVals} }
  // Persists across filter/page/sort changes until Reset is clicked
  overriddenSkus: {}
};

// ─── Pricing engine ──────────────────────────────────────────────────────────
var PE = (function(){
  function n(v){ var x=parseFloat(String(v==null?'':v).replace(/,/g,'')); return isNaN(x)?0:x; }
  function r2(v){ return Math.round(v*100)/100; }

  // costIntoPct = cost-into percentage as a number e.g. 23 (NOT 0.23)
  // item        = original row (for pre-computed rate-card charges)
  function calc(item, costIntoPct){
    var cost = n(item.cost);
    var returnCharge  = n(item.return_charge) || 59;
    var costAfter     = cost > 0 ? cost / (100 - costIntoPct) * 100 : 0;
    var gstOnReturn   = cost > 0 ? returnCharge * 0.18 : 0;
    var finalTp       = cost > 0 ? costAfter + returnCharge + gstOnReturn : 0;

    // Rate-card charges are pre-computed server-side per category/price-band.
    // Reuse them — only TP changes client-side.
    var commPct         = n(item.commission_percent);   // e.g. 12.5
    var fixedClosingFee = n(item.fixed_closing_fee);
    var fbaPickPack     = n(item.fba_pick_pack);
    var techFee         = n(item.technology_fee);
    var shippingCharged = n(item.shipping_fee_charged);
    var fixedCharges    = fixedClosingFee + fbaPickPack + techFee + shippingCharged;

    var commRate  = commPct / 100;
    if(commRate >= 1) commRate = 0;

    var sp           = Math.round(commRate < 1 ? (finalTp + fixedCharges)/(1-commRate) : finalTp + fixedCharges);
    var commAmount   = sp * commRate;
    var totalCharges = commAmount + fixedCharges;
    var sett         = sp - totalCharges;
    var netProfit    = sett - returnCharge - gstOnReturn - cost;
    var netPctSp     = sp     > 0 ? netProfit/sp*100     : 0;
    var netPctTp     = finalTp> 0 ? netProfit/finalTp*100 : 0;

    return {
      cost:                     r2(cost),
      cost_into_percent:        r2(costIntoPct),
      cost_after_percent:       r2(costAfter),
      gst_on_return:            r2(gstOnReturn),
      final_tp:                 r2(finalTp),
      required_selling_price:   sp,
      commission_amount:        r2(commAmount),
      total_charges:            r2(totalCharges),
      final_value_after_charges:r2(sett),
      sett_acc_panel:           r2(sett),
      net_profit_on_sp:         r2(netProfit),
      net_profit_percent_on_sp: r2(netPctSp),
      net_profit_percent_on_tp: r2(netPctTp)
    };
  }

  return {
    recalc: function(item, overridePct){
      var costIntoPct= overridePct  !== null ? overridePct               : n(item.cost_into_percent);
      return calc(item, costIntoPct);
    }
  };
})();

// Fields that change when pricing is recalculated
var RECALC_FIELDS = [
  'cost_into_percent','cost_after_percent','gst_on_return','final_tp',
  'required_selling_price','commission_amount','total_charges',
  'final_value_after_charges','sett_acc_panel',
  'net_profit_on_sp','net_profit_percent_on_sp','net_profit_percent_on_tp'
];
var PCT_COLS   = ['cost_into_percent','commission_percent','whf_percent_on_shipping','net_profit_percent_on_sp','net_profit_percent_on_tp'];
var MONEY_COLS = ['cost','mrp','cost_after_percent','return_charge','gst_on_return','final_tp',
  'required_selling_price','commission_amount','fixed_closing_fee','fba_pick_pack',
  'technology_fee','full_shipping_fee','shipping_fee_charged','total_charges',
  'final_value_after_charges','old_daily_sp','old_deal_sp','sett_acc_panel','net_profit_on_sp'];

function fmtCell(col, val){
  if(val===null||val===undefined) return '-';
  if(PCT_COLS.indexOf(col)   !== -1) return parseFloat(val).toFixed(2)+'%';
  if(MONEY_COLS.indexOf(col) !== -1) return '₹'+parseFloat(val).toFixed(2);
  return String(val);
}

// ─── Override UI helpers ─────────────────────────────────────────────────────
function _inputVal(id){
  var v = document.getElementById(id).value.trim();
  return (v===''||isNaN(parseFloat(v))) ? null : parseFloat(v);
}
function clearInput(inputId, clearBtnId){
  document.getElementById(inputId).value = '';
  document.getElementById(clearBtnId).classList.remove('show');
}
function _syncBadge(){
  var count = Object.keys(state.overriddenSkus).length;
  var badge = document.getElementById('overrideBadge');
  var resetBtn = document.getElementById('resetOverrideBtn');
  var applyBtn = document.getElementById('applyOverrideBtn');
  if(count > 0){
    badge.textContent  = '● ' + count.toLocaleString() + ' overridden';
    badge.classList.add('show');
    resetBtn.classList.add('show');
    applyBtn.classList.add('has-override');
  } else {
    badge.classList.remove('show');
    resetBtn.classList.remove('show');
    applyBtn.classList.remove('has-override');
  }
}

// Show ✕ per input as user types
function _wireInputClears(){
  [['costPctInput','costPctClear']].forEach(function(pair){
    var inp = document.getElementById(pair[0]);
    var clr = document.getElementById(pair[1]);
    inp.addEventListener('input', function(){
      clr.classList.toggle('show', this.value.trim() !== '');
    });
    inp.addEventListener('keydown', function(e){
      if(e.key === 'Enter') applyOverride();
    });
  });
}

function applyOverride(){
  var overridePct = _inputVal('costPctInput');

  if(overridePct === null){
    showToast('Enter a Cost % value to apply', 'error');
    return;
  }
  if(overridePct !== null && (overridePct < 0 || overridePct >= 100)){
    showToast('Cost % must be between 0 and 99', 'error');
    return;
  }

  // Apply only to currently visible rows (respects current filter/search/page)
  var applied = 0;
  state.currentItems.forEach(function(item){
    var existing = state.overriddenSkus[item.id] || {};
    var newVals = PE.recalc(item, overridePct);
    state.overriddenSkus[item.id] = {
      master_sku: item.master_sku,
      style_id: item.item_name,
      original_cost_into_percent: existing.original_cost_into_percent !== undefined ? existing.original_cost_into_percent : item.cost_into_percent,
      computed: newVals
    };
    applied++;
  });

  _syncBadge();
  _paintOverrides();

  var desc = [];
  if(overridePct !== null) desc.push('Cost % = ' + overridePct + '%');
  showToast('Applied to ' + applied + ' visible rows — ' + desc.join(', '), 'info');
}

function resetAllOverrides(){
  state.overriddenSkus = {};
  _syncBadge();
  // Re-render from clean original data
  renderTable(state.currentItems);
}

async function updateCostPercentChanges(){
  var updates = [];
  Object.keys(state.overriddenSkus).forEach(function(id){
    var ov = state.overriddenSkus[id];
    if(!ov || !ov.computed || ov.computed.cost_into_percent === undefined) return;
    var original = parseFloat(ov.original_cost_into_percent);
    var next = parseFloat(ov.computed.cost_into_percent);
    if(isNaN(next) || Math.abs((isNaN(original) ? -1 : original) - next) < 0.0001) return;
    updates.push({
      master_sku: ov.master_sku,
      style_id: ov.style_id || null,
      cost_into_percent: next
    });
  });

  if(!updates.length){
    showToast('No Cost % changes to update', 'info');
    return;
  }

  var res = await apiFetch('/api/amazon/cost-percent', {
    method: 'POST',
    body: JSON.stringify({ updates: updates })
  });
  if(res){
    showToast('Updated Cost % for ' + res.updated + ' rows', 'success');
    state.overriddenSkus = {};
    await loadItems();
  }
}

// Paint override values onto visible rows (called after render)
function _paintOverrides(){
  if(!Object.keys(state.overriddenSkus).length) return;
  var cols = state.columns.visible;

  state.currentItems.forEach(function(item){
    var ov = state.overriddenSkus[item.id];
    if(!ov) return;
    var rowEl = document.getElementById('row-'+item.id);
    if(!rowEl) return;
    var tds = rowEl.querySelectorAll('td');
    cols.forEach(function(col, c){
      if(RECALC_FIELDS.indexOf(col) === -1) return;
      if(!(col in ov.computed)) return;
      var td = tds[c + 1]; // +1 for leading # cell
      if(!td) return;
      var val = ov.computed[col];
      td.innerHTML = fmtCell(col, val);
      var isNeg = (col==='net_profit_on_sp'||col==='net_profit_percent_on_sp'||col==='net_profit_percent_on_tp') && parseFloat(val)<0;
      td.className = isNeg ? 'recalc-neg' : 'recalc';
      void td.offsetWidth; // re-trigger flash animation
    });
  });
}

async function loadColumns() {
  var res = await apiFetch('/api/amazon/columns');
  if (!res) return;
  var saved = [];
  try {
    saved = JSON.parse(localStorage.getItem(COLUMN_STORAGE_KEY) || '[]');
  } catch(e) {
    saved = [];
  }
  var allCols = res.all || res.visible || [];
  var validSaved = saved.filter(function(col) { return allCols.indexOf(col) >= 0; });
  state.columns = res;
  state.columns.all = allCols;
  state.columns.visible = validSaved.length ? validSaved : (res.visible || []);
  renderColumnMenu();
}

async function loadFilterOptions() {
  return;
}

function renderColumnMenu() {
  var menu = document.getElementById('columnMenu');
  if (!menu) return;
  var labels = state.columns.labels || {};
  var allCols = state.columns.all || state.columns.visible || [];
  var selected = state.columns.visible || [];
  var html = '<div class="column-menu-actions"><button class="btn btn-outline btn-sm" onclick="resetColumns(event)">Default</button><button class="btn btn-outline btn-sm" onclick="showAllColumns(event)">All</button></div>';
  for (var i = 0; i < allCols.length; i++) {
    var col = allCols[i];
    var checked = selected.indexOf(col) >= 0 ? ' checked' : '';
    html += '<label class="column-option"><input type="checkbox" value="' + col + '"' + checked + ' onchange="toggleColumn(this)"><span>' + (labels[col] || col) + '</span></label>';
  }
  menu.innerHTML = html;
}

function setVisibleColumns(cols) {
  var allCols = state.columns.all || [];
  state.columns.visible = cols.filter(function(col) { return allCols.indexOf(col) >= 0; });
  localStorage.setItem(COLUMN_STORAGE_KEY, JSON.stringify(state.columns.visible));
  renderColumnMenu();
  loadItems();
}

function toggleColumn(input) {
  var cols = state.columns.visible.slice();
  if (input.checked && cols.indexOf(input.value) < 0) cols.push(input.value);
  if (!input.checked) cols = cols.filter(function(col) { return col !== input.value; });
  if (cols.length === 0) {
    input.checked = true;
    return;
  }
  setVisibleColumns(cols);
}

function resetColumns(event) {
  if (event) event.stopPropagation();
  localStorage.removeItem(COLUMN_STORAGE_KEY);
  apiFetch('/api/amazon/columns').then(function(res) {
    if (!res) return;
    state.columns.visible = res.visible || [];
    renderColumnMenu();
    loadItems();
  });
}

function showAllColumns(event) {
  if (event) event.stopPropagation();
  setVisibleColumns((state.columns.all || []).slice());
}

function toggleColumnMenu(event) {
  if (event) event.stopPropagation();
  document.getElementById('columnMenu').classList.toggle('open');
}

document.addEventListener('click', function(event) {
  var picker = document.querySelector('.column-picker');
  var menu = document.getElementById('columnMenu');
  if (picker && menu && !picker.contains(event.target)) menu.classList.remove('open');
  var filterMenu = document.getElementById('filterMenu');
  if (filterMenu && !filterMenu.contains(event.target) && !event.target.classList.contains('filter-btn')) {
    filterMenu.classList.remove('open');
  }
});

function escapeHtml(value) {
  return String(value === undefined || value === null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadItems() {
  var requestId = ++state.requestSeq;
  var wrap = document.getElementById('tableWrap');
  var loadTimeout = setTimeout(function() {
    if (requestId === state.requestSeq) {
      document.getElementById('tableWrap').innerHTML = '<div style="padding:40px;color:yellow">Loading taking too long... check console</div>';
    }
  }, 5000);
  wrap.innerHTML = '<div class="table-loading"><div class="spinner"></div> Loading…</div>';
  var params = 'page=' + state.page +
    '&page_size=' + state.pageSize +
    '&search=' + encodeURIComponent(document.getElementById('searchInput').value) +
    '&sort_by=' + encodeURIComponent(state.sortBy) +
    '&sort_dir=' + encodeURIComponent(state.sortDir) +
    '&filters=' + encodeURIComponent(JSON.stringify(state.activeFilters));
  var data = await apiFetch('/api/amazon/?' + params);
  clearTimeout(loadTimeout);

  if (requestId !== state.requestSeq) {
    return;
  }
  
  if (!data) {
    document.getElementById('tableWrap').innerHTML = '<div style="padding:40px;color:var(--danger)">No data returned</div>';
    return;
  }
  
  state.total = data.total;
  state.totalPages = data.total_pages;
  state.currentItems = data.items || [];
  renderTable(data.items);
  renderPagination();
  updateStats(data.stats);
  document.getElementById('headerBadge').textContent = data.total.toLocaleString() + ' items';
  document.getElementById('syncTime').textContent = 'Last load: ' + new Date().toLocaleTimeString();
  _syncBadge();
}

function renderTable(items) {
  var cols = state.columns.visible;
  var editable = state.columns.editable;
  var labels = state.columns.labels;
  var showActions = editable.length > 0;

  var html = '<table><thead><tr>';
  html += '<th>#</th>';
  
  for (var c = 0; c < cols.length; c++) {
    var col = cols[c];
    var active = state.sortBy === col ? 'sorted' : '';
    var arrow = state.sortBy === col ? (state.sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    var filterActive = state.activeFilters[col] && state.activeFilters[col].length ? ' active' : '';
    html += '<th class="' + active + '"><div class="th-inner"><span class="th-label" onclick="sortBy(\'' + col + '\')">' + escapeHtml(labels[col] || col) + arrow + '</span><button class="filter-btn' + filterActive + '" onclick="openFilterMenu(event,\'' + col + '\')">▾</button></div></th>';
  }
  if (showActions) html += '<th>Actions</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var itemId = item.id;
    html += '<tr id="row-' + itemId + '">';
    html += '<td style="color:var(--text-muted)">' + itemId + '</td>';
    
    for (var c = 0; c < cols.length; c++) {
      var col = cols[c];
      var val = item[col];
      if (val === undefined || val === null) val = '-';
      
      if (col === 'total_stock' || col === 'uniware' || col === 'fba' || col === 'sjit' || col === 'fbf') {
        if (val !== '-') {
          val = parseInt(val).toLocaleString();
          var color = parseInt(val) > 0 ? 'var(--info)' : 'var(--text-muted)';
          val = '<span style="color:' + color + '">' + val + '</span>';
        }
      } else if (['cost_into_percent', 'commission_percent', 'whf_percent_on_shipping', 'net_profit_percent_on_sp', 'net_profit_percent_on_tp'].indexOf(col) !== -1 && val !== '-') {
        val = parseFloat(val).toFixed(2) + '%';
      } else if (['cost', 'mrp', 'cost_after_percent', 'return_charge', 'gst_on_return', 'final_tp', 'required_selling_price', 'commission_amount', 'fixed_closing_fee', 'fba_pick_pack', 'technology_fee', 'full_shipping_fee', 'shipping_fee_charged', 'total_charges', 'final_value_after_charges', 'old_daily_sp', 'old_deal_sp', 'sett_acc_panel', 'net_profit_on_sp'].indexOf(col) !== -1 && val !== '-') {
        val = '₹' + parseFloat(val).toFixed(2);
      } else {
        val = escapeHtml(val);
      }
      html += '<td>' + val + '</td>';
    }
    if (showActions) {
      html += '<td><div class="actions-cell">';
      if (editable.length > 0) {
        html += '<button class="btn btn-outline btn-sm" id="edit-btn-' + itemId + '" onclick="openEdit(' + itemId + '); event.stopPropagation();">✏</button>';
      }
      html += '</div></td>';
    }
    html += '</tr>';
  }

  if (items.length === 0) {
    var colspan = cols.length + (showActions ? 2 : 1);
    html += '<tr><td colspan="' + colspan + '" style="text-align:center;padding:40px;color:var(--text-muted)">No items found</td></tr>';
  }

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
  updateClearFiltersButton();
  // Re-paint any persisted overrides for visible rows
  _paintOverrides();
}

function updateStats(stats) {
  if (!stats) return;
  var uniwareTotal = stats.total_available !== undefined ? stats.total_available : stats.total_stock;
  document.getElementById('s-total').textContent = Number(stats.total_skus || 0).toLocaleString();
  document.getElementById('s-avail').textContent = Number(uniwareTotal || 0).toLocaleString();
  document.getElementById('s-fba').textContent = Number(stats.total_fba || 0).toLocaleString();
  document.getElementById('s-sjit').textContent = Number(stats.total_sjit || 0).toLocaleString();
  document.getElementById('s-fbf').textContent = Number(stats.total_fbf || 0).toLocaleString();
}

function renderPagination() {
  var page = state.page;
  var totalPages = state.totalPages;
  var total = state.total;
  var pageSize = state.pageSize;
  var start = (page - 1) * pageSize + 1;
  var end = Math.min(page * pageSize, total);
  document.getElementById('pageInfo').textContent = 'Showing ' + start.toLocaleString() + '-' + end.toLocaleString() + ' of ' + total.toLocaleString();
  document.getElementById('prevBtn').disabled = page <= 1;
  document.getElementById('nextBtn').disabled = page >= totalPages;
  var pn = document.getElementById('pageNumbers');
  pn.innerHTML = '';
  var range = [];
  if (totalPages <= 7) { for (var i = 1; i <= totalPages; i++) range.push(i); }
  else {
    range.push(1);
    if (page > 3) range.push('...');
    for (var i = Math.max(2, page - 1); i <= Math.min(totalPages - 1, page + 1); i++) range.push(i);
    if (page < totalPages - 2) range.push('...');
    range.push(totalPages);
  }
  for (let p = 0; p < range.length; p++) {
    let btn = document.createElement('button');
    let pg = range[p];
    btn.className = 'page-btn' + (pg === page ? ' active' : '');
    btn.textContent = pg;
    if (pg === '...') { btn.style.cursor = 'default'; btn.style.pointerEvents = 'none'; }
    else btn.onclick = function() { state.page = pg; loadItems(); };
    pn.appendChild(btn);
  }
}

function changePage(delta) { state.page = Math.max(1, Math.min(state.totalPages, state.page + delta)); loadItems(); }
function sortBy(col) { if (state.sortBy === col) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc'; else { state.sortBy = col; state.sortDir = 'asc'; } state.page = 1; loadItems(); }
function debounceSearch() { clearTimeout(state.searchTimer); state.searchTimer = setTimeout(function() { state.page = 1; loadItems(); }, 350); }
function updateClearFiltersButton() {
  var hasFilters = Object.keys(state.activeFilters).some(function(col) { return state.activeFilters[col] && state.activeFilters[col].length; });
  document.getElementById('clearFiltersBtn').classList.toggle('show', hasFilters);
}
function clearAllFilters() {
  state.activeFilters = {};
  state.page = 1;
  loadItems();
}

function renderFilterMenu(query) {
  var col = state.filterMenuColumn;
  var menu = document.getElementById('filterMenu');
  query = query || '';
  var labels = state.columns.labels || {};
  var active = state.activeFilters[col] || [];
  var values = state.filterMenuValues || [];
  var visibleValues = values.filter(function(value) { return String(value).toLowerCase().indexOf(String(query || '').toLowerCase()) >= 0; });
  var activeSet = {};
  for (var a = 0; a < active.length; a++) activeSet[String(active[a])] = true;
  var hasActive = active.length > 0;
  var html = '<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--gold)">' + escapeHtml(labels[col] || col) + '</div>';
  html += '<input class="filter-menu-search" placeholder="Search values..." oninput="renderFilterMenu(this.value)" value="' + escapeHtml(query) + '">';
  html += '<div class="filter-menu-actions"><button class="btn btn-outline btn-sm" onclick="checkFilterValues(true)">All</button><button class="btn btn-outline btn-sm" onclick="checkFilterValues(false)">None</button><button class="btn btn-outline btn-sm" onclick="clearColumnFilter()">Clear</button></div>';
  html += '<div class="filter-menu-list">';
  for (var i = 0; i < visibleValues.length; i++) {
    var value = visibleValues[i];
    var checked = (!hasActive || activeSet[String(value)]) ? ' checked' : '';
    html += '<label class="column-option"><input class="filter-value-check" type="checkbox" value="' + escapeHtml(value) + '"' + checked + '><span>' + escapeHtml(value === '' ? '(Blank)' : value) + '</span></label>';
  }
  if (visibleValues.length === 0) html += '<div style="padding:16px;color:var(--text-muted);font-size:12px">No values</div>';
  html += '</div><div class="filter-menu-actions" style="justify-content:flex-end"><button class="btn btn-outline btn-sm" onclick="closeFilterMenu()">Cancel</button><button class="btn btn-gold btn-sm" onclick="applyColumnFilter()">Apply</button></div>';
  menu.innerHTML = html;
  setTimeout(function() {
    var input = document.querySelector('#filterMenu .filter-menu-search');
    if (input) {
      input.focus();
      input.setSelectionRange(query.length, query.length);
    }
  }, 0);
}

function checkFilterValues(checked) {
  var boxes = document.querySelectorAll('#filterMenu .filter-value-check');
  for (var i = 0; i < boxes.length; i++) boxes[i].checked = checked;
}

function clearColumnFilter() {
  delete state.activeFilters[state.filterMenuColumn];
  closeFilterMenu();
  state.page = 1;
  loadItems();
}

function applyColumnFilter() {
  var boxes = document.querySelectorAll('#filterMenu .filter-value-check');
  var selected = [];
  for (var i = 0; i < boxes.length; i++) {
    if (boxes[i].checked) selected.push(boxes[i].value);
  }
  if (selected.length === 0) {
    state.activeFilters[state.filterMenuColumn] = ['__NO_MATCH__'];
  } else if (selected.length === (state.filterMenuValues || []).length) {
    delete state.activeFilters[state.filterMenuColumn];
  } else {
    state.activeFilters[state.filterMenuColumn] = selected;
  }
  closeFilterMenu();
  state.page = 1;
  loadItems();
}

function closeFilterMenu() {
  document.getElementById('filterMenu').classList.remove('open');
}

async function openEdit(id) {
  var item = await apiFetch('/api/items/' + id);
  if (!item) {
    showToast('Item not found', 'error');
    return;
  }
  state.editItem = item;
  var editable = state.columns.editable;
  var labels = state.columns.labels;
  var fields = document.getElementById('editFields');
  var editableFields = [];
  for (var i = 0; i < state.columns.visible.length; i++) {
    if (state.columns.visible[i] !== 'sku_code') editableFields.push(state.columns.visible[i]);
  }
  var fieldsHtml = '<div class="form-field" style="grid-column:1/-1"><label>' + (labels.sku_code || 'SKU Code') + '</label><input value="' + item.sku_code + '" disabled></div>';
  for (var i = 0; i < editableFields.length; i++) {
    var col = editableFields[i];
    var isEditable = editable.indexOf(col) >= 0 || user.role === 'admin';
    var val = item[col] || '';
    var inputType = 'text';
    if (col === 'price' || col === 'cost' || col === 'mrp' || col === 'total_stock' || col === 'available_atp' || col === 'fba_stock' || col === 'sjit_stock' || col === 'fbf_stock') inputType = 'number';
    else if (col === 'updated') inputType = 'date';
    fieldsHtml += '<div class="form-field"><label>' + (labels[col] || col) + '</label><input name="' + col + '" type="' + inputType + '" value="' + val + '"' + (!isEditable ? ' disabled' : '') + '></div>';
  }
  fields.innerHTML = fieldsHtml;
  openModal('editModal');
}

async function saveEdit() {
  var fields = document.getElementById('editFields');
  var inputs = fields.querySelectorAll('input:not([disabled]), select:not([disabled])');
  var body = {};
  for (var i = 0; i < inputs.length; i++) {
    var el = inputs[i];
    if (el.name) body[el.name] = el.value === '' ? null : el.value;
  }
  var res = await apiFetch('/api/items/' + state.editItem.id, { method: 'PUT', body: JSON.stringify(body) });
  if (res) { closeModal('editModal'); showToast('Item updated successfully', 'success'); loadItems(); }
}

async function deleteItem(id) {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  var res = await apiFetch('/api/items/' + id, { method: 'DELETE' });
  if (res) { showToast('Item deleted', 'success'); loadItems(); }
}

async function exportDashboard() {
  showToast('Preparing export…', 'info');
  try {
    var res = await fetch('/api/amazon/export', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { showToast('Export failed', 'error'); return; }
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'amazon_pricing_export_' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Export downloaded!', 'success');
  } catch(e) { showToast('Export error: ' + e.message, 'error'); }
}
function exportData() { exportDashboard(); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function apiFetch(url, opts) {
  opts = opts || {};
  var headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  if (opts.headers) {
    for (var k in opts.headers) headers[k] = opts.headers[k];
  }
  try {
    var res = await fetch(API + url, {
      headers: headers,
      cache: 'no-store',
      method: opts.method || 'GET',
      body: opts.body
    });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/'; return null; }
    if (!res.ok) { var d = await res.json(); showToast(d.detail || 'Request failed', 'error'); return null; }
    var data = await res.json();
    return data;
  } catch(e) { console.log('Fetch error:', e); showToast('Connection error', 'error'); return null; }
}

function showToast(msg, type) {
  var tc = document.getElementById('toastContainer');
  var icons = { success: '✅', error: '❌', info: 'ℹ️' };
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<span>' + (icons[type] || 'ℹ️') + '</span><span>' + msg + '</span>';
  tc.appendChild(el);
  setTimeout(function() { el.remove(); }, 4000);
}

function logout() { fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); localStorage.clear(); window.location.href = '/'; }
</script>
