<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Errors - Rajnandini ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#0d0f0e;--surface:#111614;--surface2:#181e1b;--surface3:#1e2724; --gold:#c9a96e;--gold2:#e8c98a;--gold-dim:rgba(201,169,110,0.15); --green:#2d6a4f;--text:#e8e4dc;--text-muted:#7a8580;--text-dim:#4a5550; --border:#222c28;--border2:#2a3530; --danger:#e05252;--danger-dim:rgba(224,82,82,0.12); --warning:#f4a261;--warning-dim:rgba(244,162,97,0.12); --info:#4db8d4;--success:#52b788;--success-dim:rgba(82,183,136,0.12); --sidebar-w:220px;--header-h:60px; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold2);line-height:1.2}
.logo-sub{font-size:9px;color:var(--text-muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.sidebar-user{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gold));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.nav-section{padding:12px 0;flex:1;overflow-y:auto}
.nav-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .15s;text-decoration:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}.nav-item.active{background:var(--gold-dim);color:var(--gold2)}.nav-item .icon{font-size:15px;width:20px;text-align:center;font-family:'DM Mono',monospace}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;flex-shrink:0}
.header-title{font-size:15px;font-weight:600}.header-badge{background:var(--warning-dim);color:var(--warning);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}.sync-time{font-size:11px;color:var(--text-muted)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8914e);color:#1a1208}.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,169,110,.3)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text-muted)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}.btn-sm{padding:5px 10px;font-size:11px}
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0}
.stat-card{flex:1;padding:14px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}.stat-card:last-child{border-right:none}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}.stat-value{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.stat-value.gold{color:var(--gold2)}.stat-value.green{color:var(--success)}.stat-value.blue{color:var(--info)}.stat-value.orange{color:var(--warning)}.stat-value.red{color:var(--danger)}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;flex:1;min-width:220px;max-width:380px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:100%}.search-box input::placeholder{color:var(--text-muted)}
.tabs{display:flex;align-items:center;gap:6px}
.tab-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:8px 12px}
.tab-btn:hover{border-color:var(--gold);color:var(--gold)}.tab-btn.active{border-color:var(--warning);color:var(--warning);background:var(--warning-dim)}
.table-wrap{flex:1;overflow:auto;position:relative}table{width:100%;border-collapse:collapse;font-size:12px}thead{position:sticky;top:0;z-index:10}
th{background:var(--surface2);color:var(--text-muted);font-weight:600;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
th:hover,th.sorted{color:var(--gold)}td{padding:9px 12px;border-bottom:1px solid rgba(34,44,40,.6);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace;font-size:11px}
tr:hover td{background:rgba(255,255,255,.02)}.table-loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-muted);gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.pagination{background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.page-info{font-size:12px;color:var(--text-muted);margin-right:auto}.page-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-btn:hover{border-color:var(--gold);color:var(--gold)}.page-btn.active{background:var(--gold);color:#1a1208;border-color:var(--gold);font-weight:700}.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-size-select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;outline:none}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;min-width:240px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}.toast.error{border-color:rgba(224,82,82,.4)}.toast.info{border-color:rgba(77,184,212,.4)}
</style>
</head>
<body>
<aside class="sidebar">
<div class="sidebar-logo"><div class="logo-text">Rajnandini</div><div class="logo-sub">ERP Suite - Pricing</div></div>
<div class="sidebar-user"><div class="user-avatar" id="userAvatar">U</div><div><div class="user-name" id="userName">-</div><div class="user-role" id="userRole">-</div></div></div>
<nav class="nav-section">
<div class="nav-label">Menu</div>
<a class="nav-item" href="/dashboard" id="nav-item-master"><span class="icon">IM</span> Item Master</a>
<a class="nav-item" href="/amazon-pricing" id="nav-amazon"><span class="icon">AP</span> Amazon Pricing</a>
<a class="nav-item active" href="/errors" id="nav-errors"><span class="icon">!</span> Errors</a>
<a class="nav-item" href="/admin" id="nav-admin"><span class="icon">AD</span> Admin Panel</a>
</nav>
<div class="sidebar-footer"><a class="nav-item" href="#" onclick="logout()" style="color:var(--danger)"><span class="icon">SO</span> Sign Out</a></div>
</aside>
<main class="main">
<header class="header">
<span class="icon" style="font-size:18px">!</span>
<span class="header-title">Errors</span>
<span class="header-badge" id="headerBadge">Loading...</span>
<div class="header-right">
<span class="sync-time" id="syncTime">-</span>
<button class="btn btn-gold btn-sm" onclick="loadActiveTable()" title="Refresh">Refresh</button>
</div>
</header>
<div class="stats-bar">
<div class="stat-card"><div class="stat-label">Error SKUs</div><div class="stat-value red" id="s-errors">-</div></div>
<div class="stat-card"><div class="stat-label">Total Stock</div><div class="stat-value gold" id="s-stock">-</div></div>
<div class="stat-card"><div class="stat-label">Uniware Stock</div><div class="stat-value green" id="s-uniware">-</div></div>
<div class="stat-card"><div class="stat-label">FBA</div><div class="stat-value blue" id="s-fba">-</div></div>
<div class="stat-card"><div class="stat-label">SJIT</div><div class="stat-value orange" id="s-sjit">-</div></div>
<div class="stat-card"><div class="stat-label">FBF</div><div class="stat-value gold" id="s-fbf">-</div></div>
</div>
<div class="toolbar">
<div class="tabs" id="errorTabs"></div>
<div class="search-box"><span>Search</span><input type="text" id="searchInput" placeholder="Master SKU" oninput="debounceSearch()"></div>
</div>
<div class="table-wrap" id="tableWrap"><div class="table-loading"><div class="spinner"></div> Loading...</div></div>
<div class="pagination">
<span class="page-info" id="pageInfo">-</span>
<button class="page-btn" id="prevBtn" onclick="changePage(-1)">&lt;</button>
<div id="pageNumbers" style="display:flex;gap:4px"></div>
<button class="page-btn" id="nextBtn" onclick="changePage(1)">&gt;</button>
<select class="page-size-select" id="pageSizeSelect" onchange="state.pageSize=parseInt(this.value);state.page=1;loadActiveTable()"><option value="50">50 / page</option><option value="100">100 / page</option><option value="200">200 / page</option></select>
</div>
</main>
<div class="toast-container" id="toastContainer"></div>
<script>
var API = '';
var token = localStorage.getItem('token');
var user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = '/';

var ERROR_TABLES = [
  { id: 'missing_master_sku_orders', title: 'Missing Master SKU for Orders', endpoint: '/api/items/stock-errors' }
];
var state = { tableId: 'missing_master_sku_orders', page: 1, pageSize: 50, total: 0, totalPages: 0, sortBy: 'master_sku', sortDir: 'asc', searchTimer: null, requestSeq: 0, columns: [], labels: {} };

(function() {
  setupUser();
  renderTabs();
  loadActiveTable();
})();

function setupUser() {
  document.getElementById('userAvatar').textContent = (user.username || 'U')[0].toUpperCase();
  document.getElementById('userName').textContent = user.username || '-';
  document.getElementById('userRole').textContent = user.role || '-';
  var pages = user.allowed_pages || [];
  if (pages.indexOf('item_master') < 0 && user.role !== 'admin') {
    document.getElementById('nav-item-master').style.display = 'none';
  }
  if (pages.indexOf('amazon_pricing') < 0 && user.role !== 'admin') {
    document.getElementById('nav-amazon').style.display = 'none';
  }
  if (pages.indexOf('admin') < 0 && user.role !== 'admin') {
    document.getElementById('nav-admin').style.display = 'none';
  }
}

function activeTable() {
  return ERROR_TABLES.find(function(t) { return t.id === state.tableId; }) || ERROR_TABLES[0];
}

function renderTabs() {
  var html = '';
  for (var i = 0; i < ERROR_TABLES.length; i++) {
    var table = ERROR_TABLES[i];
    html += '<button class="tab-btn' + (table.id === state.tableId ? ' active' : '') + '" onclick="selectTable(\'' + table.id + '\')">' + escapeHtml(table.title) + '</button>';
  }
  document.getElementById('errorTabs').innerHTML = html;
}

function selectTable(tableId) {
  state.tableId = tableId;
  state.page = 1;
  state.sortBy = 'master_sku';
  state.sortDir = 'asc';
  renderTabs();
  loadActiveTable();
}

async function loadActiveTable() {
  var requestId = ++state.requestSeq;
  var table = activeTable();
  document.getElementById('tableWrap').innerHTML = '<div class="table-loading"><div class="spinner"></div> Loading...</div>';
  var params = 'page=' + state.page +
    '&page_size=' + state.pageSize +
    '&search=' + encodeURIComponent(document.getElementById('searchInput').value) +
    '&sort_by=' + encodeURIComponent(state.sortBy) +
    '&sort_dir=' + encodeURIComponent(state.sortDir);
  var data = await apiFetch(table.endpoint + '?' + params);
  if (requestId !== state.requestSeq) return;
  if (!data) {
    document.getElementById('tableWrap').innerHTML = '<div style="padding:40px;color:var(--danger)">No data returned</div>';
    return;
  }
  state.total = data.total || 0;
  state.totalPages = data.total_pages || 1;
  state.columns = data.columns || [];
  state.labels = data.labels || {};
  renderTable(data.items || []);
  renderPagination();
  updateStats(data.stats || {});
  document.getElementById('headerBadge').textContent = state.total.toLocaleString() + ' rows';
  document.getElementById('syncTime').textContent = 'Last load: ' + new Date().toLocaleTimeString();
}

function renderTable(items) {
  var html = '<table><thead><tr><th>#</th>';
  for (var c = 0; c < state.columns.length; c++) {
    var col = state.columns[c];
    var active = state.sortBy === col ? ' sorted' : '';
    var arrow = state.sortBy === col ? (state.sortDir === 'asc' ? ' up' : ' down') : '';
    html += '<th class="' + active + '" onclick="sortBy(\'' + col + '\')">' + escapeHtml(state.labels[col] || col) + arrow + '</th>';
  }
  html += '</tr></thead><tbody>';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    html += '<tr><td style="color:var(--text-muted)">' + (((state.page - 1) * state.pageSize) + i + 1) + '</td>';
    for (var j = 0; j < state.columns.length; j++) {
      var key = state.columns[j];
      var value = item[key];
      if (value === null || value === undefined || value === '') value = '-';
      if (key !== 'master_sku' && value !== '-') {
        var numberValue = parseInt(value);
        var color = numberValue > 0 ? 'var(--warning)' : 'var(--text-muted)';
        value = '<span style="color:' + color + '">' + numberValue.toLocaleString() + '</span>';
      } else {
        value = escapeHtml(value);
      }
      html += '<td>' + value + '</td>';
    }
    html += '</tr>';
  }
  if (!items.length) {
    html += '<tr><td colspan="' + (state.columns.length + 1) + '" style="text-align:center;padding:40px;color:var(--success)">No rows found</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function renderPagination() {
  var total = state.total;
  var start = total ? (state.page - 1) * state.pageSize + 1 : 0;
  var end = Math.min(state.page * state.pageSize, total);
  document.getElementById('pageInfo').textContent = 'Showing ' + start.toLocaleString() + '-' + end.toLocaleString() + ' of ' + total.toLocaleString();
  document.getElementById('prevBtn').disabled = state.page <= 1;
  document.getElementById('nextBtn').disabled = state.page >= state.totalPages;
  var pages = [];
  if (state.totalPages <= 7) {
    for (var i = 1; i <= state.totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (state.page > 3) pages.push('...');
    for (var p = Math.max(2, state.page - 1); p <= Math.min(state.totalPages - 1, state.page + 1); p++) pages.push(p);
    if (state.page < state.totalPages - 2) pages.push('...');
    pages.push(state.totalPages);
  }
  var html = '';
  for (var j = 0; j < pages.length; j++) {
    var pg = pages[j];
    html += '<button class="page-btn' + (pg === state.page ? ' active' : '') + '"' + (pg === '...' ? ' disabled' : ' onclick="state.page=' + pg + ';loadActiveTable()"') + '>' + pg + '</button>';
  }
  document.getElementById('pageNumbers').innerHTML = html;
}

function updateStats(stats) {
  document.getElementById('s-errors').textContent = (stats.total_error_skus || 0).toLocaleString();
  document.getElementById('s-stock').textContent = (stats.total_stock || 0).toLocaleString();
  document.getElementById('s-uniware').textContent = (stats.total_available || 0).toLocaleString();
  document.getElementById('s-fba').textContent = (stats.total_fba || 0).toLocaleString();
  document.getElementById('s-sjit').textContent = (stats.total_sjit || 0).toLocaleString();
  document.getElementById('s-fbf').textContent = (stats.total_fbf || 0).toLocaleString();
}

function changePage(delta) {
  state.page = Math.max(1, Math.min(state.totalPages, state.page + delta));
  loadActiveTable();
}

function sortBy(col) {
  if (state.sortBy === col) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  else { state.sortBy = col; state.sortDir = 'asc'; }
  state.page = 1;
  loadActiveTable();
}

function debounceSearch() {
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(function() { state.page = 1; loadActiveTable(); }, 350);
}

function escapeHtml(value) {
  return String(value === undefined || value === null ? '' : value)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function apiFetch(url, opts) {
  opts = opts || {};
  try {
    var res = await fetch(API + url, { method: opts.method || 'GET', body: opts.body, cache: 'no-store', headers: { 'Authorization': 'Bearer ' + token } });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/'; return null; }
    if (!res.ok) {
      var d = await res.json();
      showToast(d.detail || 'Request failed', 'error');
      return null;
    }
    return await res.json();
  } catch(e) {
    showToast('Connection error', 'error');
    return null;
  }
}

function showToast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.innerHTML = '<span>' + escapeHtml(msg) + '</span>';
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(function() { el.remove(); }, 4000);
}

function logout() {
  fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
  localStorage.clear();
  window.location.href = '/';
}
</script>
</body>
</html>
